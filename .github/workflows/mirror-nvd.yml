name: Mirror NVD feeds

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Create dir
        run: mkdir -p nvd

      - name: Download feeds
        run: |
          BASE=https://nvd.nist.gov/feeds/json/cve/2.0

          curl -L $BASE/nvdcve-2.0-modified.json.gz -o nvd/nvdcve-modified.json.gz
          curl -L $BASE/nvdcve-2.0-recent.json.gz -o nvd/nvdcve-recent.json.gz

          curl -L $BASE/nvdcve-2.0-modified.meta -o nvd/nvdcve-modified.meta
          curl -L $BASE/nvdcve-2.0-recent.meta -o nvd/nvdcve-recent.meta

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          
          DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          echo "lastUpdated=$DATE" > nvd/cache.properties
          
          git add nvd
          git commit -m "update NVD feeds" || echo "no changes"
          git push

  
      

